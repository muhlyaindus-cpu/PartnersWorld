<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Запросы на партнёрство | Partners World</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" type="image/x-icon" href="/favicon/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
<link rel="manifest" href="/favicon/site.webmanifest">
</head>
<body>
    <!-- Шапка (такая же, как везде) -->
    <header class="header">
        <div class="header-container">
        <a href="/" class="logo-block">
            <img src="/images/logo.png" alt="Partners World" class="logo-img">
        </a>
        <nav class="nav-menu">
            <a href="/" class="nav-link">Главная</a>
            <a href="/about.html" class="nav-link">О проекте</a>
            <a href="/profile.html" class="nav-link" id="profileLink" style="display: none;">Мой профиль</a>
            <a href="/login.html" class="nav-link" id="loginLink">Вход</a>
            <a href="/register.html" class="nav-link btn-register" id="registerLink">Регистрация</a>
            <span class="user-info" id="userInfo" style="display: none;"></span>
            <button class="logout-btn" id="logoutBtn" style="display: none;" onclick="logout()">Выйти</button>
        </nav>
    </div>
    </header>

    <main>
        <div class="container">
            <h1>Все запросы на партнёрство</h1>
            <!-- Фильтр по стране (опционально) -->
            <div class="filter-section">
                <input type="text" id="countryFilter" placeholder="Фильтр по стране (например, BR, US, RU)">
                <button onclick="applyFilter()">Применить</button>
                <button onclick="clearFilter()">Сбросить</button>
            </div>
            <!-- Список запросов -->
            <div id="requestsList" class="requests-list">
                <div class="loading">Загрузка запросов...</div>
            </div>
        </div>
    </main>

    <!-- Подвал -->
    <footer class="footer">
        <div class="container footer-container">
            <div class="footer-logo">Partners World</div>
            <div class="footer-links">
                <a href="/">Главная</a>
                <a href="/about.html">О проекте</a>
                <a href="/privacy.html">Конфиденциальность</a>
                <a href="/terms.html">Условия</a>
            </div>
            <div class="footer-copyright">© 2026 Partners World. Все права защищены.</div>
        </div>
    </footer>

    <script src="/js/app.js"></script>
</body>
</html>
