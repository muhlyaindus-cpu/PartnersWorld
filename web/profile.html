<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Личный кабинет | Partners World</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" type="image/x-icon" href="/favicon/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
<link rel="manifest" href="/favicon/site.webmanifest">
</head>
<body>
    <!-- Шапка (можно скопировать с главной) -->
    <header class="header">
    <div class="header-container">
        <a href="/" class="logo-block">
            <img src="/images/logo.png" alt="Partners World" class="logo-img">
        </a>
        <nav class="nav-menu">
            <a href="/requests.html" class="nav-link" id="requestsLink">Запросы</a>
            <a href="/" class="nav-link">Главная</a>
            <a href="/about.html" class="nav-link">О проекте</a>
            <a href="/profile.html" class="nav-link" id="profileLink" style="display: none;">Мой профиль</a>
            <a href="/login.html" class="nav-link" id="loginLink">Вход</a>
            <a href="/register.html" class="nav-link btn-register" id="registerLink">Регистрация</a>
            <span class="user-info" id="userInfo" style="display: none;"></span>
            <button class="logout-btn" id="logoutBtn" style="display: none;" onclick="logout()">Выйти</button>
        </nav>
    </div>
</header>

    <main>
        <div class="container">
            <h1>Личный кабинет</h1>

            <!-- Вкладки -->
            <div class="profile-tabs">
                <button class="tab active" data-tab="edit">Редактировать профиль</button>
                <button class="tab" data-tab="favorites">Избранные партнёры</button>
                <button class="tab" data-tab="contacts">История связей</button>
                <button class="tab" data-tab="deals">Сделки</button>
            </div>

            <!-- Содержимое вкладок -->
            <div id="edit-tab" class="tab-content active">
                <form id="profileForm">
                    <div class="form-group">
                        <label for="company">Компания</label>
                        <input type="text" id="company" name="company_name" placeholder="Название компании">
                    </div>
                    <div class="form-group">
                        <label for="description">Описание</label>
                        <textarea id="description" name="description" rows="3" placeholder="Расскажите о себе"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="services">Услуги</label>
                        <textarea id="services" name="services" rows="3" placeholder="Например: логистика, юридическая поддержка, маркетинг"></textarea>
                    </div>
                    <div class="form-group">
                        <label for="portfolio">Портфолио / Ссылки</label>
                        <textarea id="portfolio" name="portfolio" rows="3" placeholder="Ссылки на ваши работы, профили"></textarea>
                    </div>
                   
                    <div class="form-group">
                        <label for="contact_info">Контакты (Telegram, WhatsApp и т.д.)</label>
                        <input type="text" id="contact_info" name="contact_info" placeholder="@username, +123456789">
                    </div>
                    <button type="submit" class="btn btn-primary">Сохранить изменения</button>
                </form>
                <div id="profileMessage" class="result"></div>
            </div>

            <div id="favorites-tab" class="tab-content">
                <p>Скоро здесь будут избранные партнёры.</p>
            </div>
            <div id="contacts-tab" class="tab-content">
                <p>Скоро здесь появится история ваших связей.</p>
            </div>
            <div id="deals-tab" class="tab-content">
                <p>Скоро здесь будут ваши сделки.</p>
            </div>
        </div>
    </main>

    <!-- Подвал -->
    <footer class="footer">
        <div class="container footer-container">
            <div class="footer-logo">Partners World</div>
            <div class="footer-links">
                <a href="/">Главная</a>
                <a href="/about.html">О проекте</a>
                <a href="/privacy.html">Конфиденциальность</a>
                <a href="/terms.html">Условия</a>
            </div>
            <div class="footer-copyright">© 2026 Partners World. Все права защищены.</div>
        </div>
    </footer>

    <script src="/js/app.js"></script>
    <script src="/js/profile.js"></script>
</body>
</html>
