<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | Partners World</title>
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" type="image/x-icon" href="/favicon/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png">
<link rel="manifest" href="/favicon/site.webmanifest">
</head>
<body>
       <header class="header">
    <div class="header-container">
        <a href="/" class="logo-block">
            <img src="/images/logo.png" alt="Partners World" class="logo-img">
        </a>
        <nav class="nav-menu">
            <a href="/requests.html" class="nav-link" id="requestsLink">Запросы</a>
            <a href="/" class="nav-link">Главная</a>
            <a href="/about.html" class="nav-link">О проекте</a>
            <a href="/profile.html" class="nav-link" id="profileLink" style="display: none;">Мой профиль</a>
            <a href="/login.html" class="nav-link" id="loginLink">Вход</a>
            <a href="/register.html" class="nav-link btn-register" id="registerLink">Регистрация</a>
            <span class="user-info" id="userInfo" style="display: none;"></span>
            <button class="logout-btn" id="logoutBtn" style="display: none;" onclick="logout()">Выйти</button>
        </nav>
    </div>
</header>
    <div class="container">
        <h2>Вход в систему</h2>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">Email *</label>
                <input type="email" id="email" required placeholder="your@email.com">
            </div>

            <div class="form-group">
                <label for="password">Пароль *</label>
                <input type="password" id="password" required placeholder="Введите пароль">
            </div>

            <button type="submit">Войти</button>
        </form>

        <div id="result" class="result"></div>

        <p class="link">Ещё нет аккаунта? <a href="/register.html">Зарегистрироваться</a></p>
    </div>
    <script src="/js/app.js"></script>
    <script src="/js/login.js"></script>
</body>
</html>
